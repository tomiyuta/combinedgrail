name: Monthly Signal — Combined Grail

on:
  schedule:
    - cron: '30 21 1 * *'  # 毎月1日 UTC21:30 = JST06:30
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Update market data
        run: python3 scripts/update_data.py

      - name: Generate signals (ETF M4 + OG defense)
        run: python3 scripts/generate_combined.py

      - name: Generate cumulative returns (standalone — no external deps)
        run: python3 scripts/gen_cumulative.py

      - name: Generate DSR + Walk-Forward (auto-regenerate after cumulative)
        run: python3 scripts/gen_dsr_wf.py

      - name: Commit and push
        run: |
          git config user.name "tomiyuta"
          git config user.email "tomiyutaka@gmail.com"
          git add output/ data/market/prices_monthly_2004_2026.csv data/fred/FRED_VXVCLS_auto.csv
          if git diff --staged --quiet; then echo "No changes"
          else git commit -m "📊 Monthly update $(date +'%Y-%m')" && git push; fi

name: Monthly Signal — α-Grail (Web Complete)

on:
  schedule:
    - cron: '30 21 1 * *'  # 毎月1日 UTC21:30 = JST06:30
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      # Step1: 日次株価更新（yfinance）
      - name: Update daily prices
        run: python3 scripts/update_prices.py

      # Step2: αシグナル生成（yfinance + FRED API）
      - name: Generate alpha signal (web)
        run: python3 scripts/generate_signal_alpha.py

      # Step3: OG防御型シグナル生成（yfinance）
      - name: Generate OG defense signal (yfinance)
        run: python3 scripts/generate_signal_def.py

      # Step4: 統合シグナル生成（signal_latest.json）
      - name: Combine signals
        run: python3 scripts/generate_signal_combined.py

      # Step5: 前月リターン追記（案B: 既存JSON末尾に1ヶ月追記）
      - name: Append monthly return (web)
        run: python3 scripts/append_monthly_return.py

      # Step6: git push
      - name: Commit and push
        run: |
          git config user.name "tomiyuta"
          git config user.email "tomiyutaka@gmail.com"
          git add output/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Monthly update $(date +'%Y-%m') — web auto" && git push
          fi
